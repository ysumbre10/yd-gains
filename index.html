<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0b0b0d" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="format-detection" content="telephone=no" />
<title>YD Gains · Gold's Gym Training Split</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --gold:#d4af37;
    --gold-soft:#e8c860;
    --bg:#0b0b0d;
    --bg-2:#141418;
    --card:#1b1b21;
    --card-2:#22222a;
    --line:#2c2c35;
    --text:#f4f4f5;
    --muted:#a1a1aa;
    --prim:#edc043;
    --sec:#806a2c;
    --shadow:0 18px 40px rgba(0,0,0,.45);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html{scroll-behavior:smooth;-webkit-text-size-adjust:100%;text-size-adjust:100%}
  body{
    background:radial-gradient(1200px 600px at 50% -10%, #1a1a20 0%, var(--bg) 55%);
    color:var(--text);
    font-family:'Inter',system-ui,sans-serif;
    min-height:100vh;
    padding-bottom:calc(60px + env(safe-area-inset-bottom));
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.brand,.tab-btn,.daytag,.exnum{font-family:'Oswald',sans-serif;letter-spacing:.5px}

  /* ---------- Header ---------- */
  header{
    text-align:center;
    padding:42px 20px 26px;
    border-bottom:1px solid var(--line);
    background:linear-gradient(180deg, rgba(212,175,55,.06), transparent);
  }
  .brand{font-size:clamp(34px,6vw,58px);font-weight:700;text-transform:uppercase;line-height:1}
  .brand span{color:var(--gold)}
  .tagline{color:var(--muted);margin-top:10px;font-size:14px;letter-spacing:2px;text-transform:uppercase}

  /* ---------- Tabs ---------- */
  .tabs{
    position:sticky;top:0;z-index:20;
    display:flex;gap:6px;justify-content:center;flex-wrap:wrap;
    padding:14px 14px;
    padding-top:calc(14px + env(safe-area-inset-top));
    background:rgba(11,11,13,.92);
    backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);
  }
  .tab-btn{
    cursor:pointer;border:1px solid var(--line);background:var(--card);
    color:var(--muted);border-radius:12px;padding:10px 16px;
    font-size:15px;font-weight:600;text-transform:uppercase;
    transition:.18s ease;min-width:104px;text-align:center;line-height:1.2;
  }
  .tab-btn small{display:block;font-size:11px;font-family:'Inter';letter-spacing:.5px;opacity:.7;font-weight:500}
  .tab-btn:hover{border-color:var(--gold);color:var(--text);transform:translateY(-1px)}
  .tab-btn.active{
    background:linear-gradient(180deg,var(--gold),#b8932b);
    color:#1a1a1a;border-color:var(--gold);box-shadow:0 6px 18px rgba(212,175,55,.3);
  }
  .tab-btn.active small{opacity:.85}

  /* ---------- Day content ---------- */
  .wrap{max-width:1120px;margin:0 auto;padding:30px 18px 0}
  .day-head{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:6px}
  .daytag{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:#1a1a1a;background:var(--gold);padding:5px 12px;border-radius:8px}
  .day-title{font-size:clamp(26px,4vw,38px);font-weight:700;text-transform:uppercase}
  .day-focus{color:var(--muted);margin:4px 0 12px;font-size:15px}

  .legend{display:flex;gap:18px;margin:0 0 24px;font-size:12.5px;color:var(--muted);flex-wrap:wrap}
  .legend i{display:inline-block;width:13px;height:13px;border-radius:3px;margin-right:7px;vertical-align:-2px;border:1px solid rgba(255,255,255,.12)}
  .sw-p{background:var(--prim)} .sw-s{background:var(--sec)} .sw-i{background:#41414c}

  .section-label{display:flex;align-items:center;gap:12px;margin:34px 0 16px;font-family:'Oswald';font-size:20px;text-transform:uppercase;letter-spacing:1px}
  .section-label::after{content:"";flex:1;height:1px;background:var(--line)}
  .section-label .dot{width:9px;height:9px;border-radius:50%;background:var(--gold)}

  .warm-intro{background:var(--bg-2);border:1px solid var(--line);border-left:3px solid var(--gold);border-radius:12px;padding:16px 18px;color:var(--muted);font-size:14px;margin-bottom:18px;line-height:1.6}
  .warm-intro b{color:var(--text)}

  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:16px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:hidden;transition:.18s ease;display:flex;flex-direction:column}
  .card:hover{transform:translateY(-3px);border-color:var(--gold);box-shadow:var(--shadow)}
  .thumb{height:212px;background:radial-gradient(120% 120% at 50% 0%,#22222b,#141419);display:flex;align-items:center;justify-content:center;border-bottom:1px solid var(--line);position:relative;padding:8px}
  .thumb svg{height:190px;width:auto;max-width:100%}
  .exnum{position:absolute;top:10px;left:10px;width:30px;height:30px;border-radius:8px;background:var(--gold);color:#1a1a1a;font-weight:700;font-size:15px;display:flex;align-items:center;justify-content:center;z-index:2}
  .badge{position:absolute;top:10px;right:10px;font-size:10px;letter-spacing:.5px;text-transform:uppercase;background:rgba(0,0,0,.55);color:var(--gold-soft);padding:4px 8px;border-radius:6px;border:1px solid var(--line);z-index:2}
  .card-body{padding:15px 16px 18px;display:flex;flex-direction:column;gap:8px;flex:1}
  .ex-name{font-family:'Oswald';font-size:19px;font-weight:600;line-height:1.2}
  .ex-target{font-size:12px;color:var(--gold-soft);text-transform:uppercase;letter-spacing:.6px;font-weight:600}
  .ex-also{font-size:12px;color:var(--muted);margin-top:-3px}
  .ex-also b{color:#cfcfd6;font-weight:500}
  .ex-meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:3px}
  .pill{background:var(--card-2);border:1px solid var(--line);border-radius:7px;padding:5px 9px;font-size:12px;color:var(--muted)}
  .pill b{color:var(--text);font-weight:600}
  .steps{margin:8px 0 0;padding-left:18px;display:flex;flex-direction:column;gap:5px}
  .steps li{font-size:13px;color:var(--muted);line-height:1.45}
  .steps li::marker{color:var(--gold);font-weight:700}

  footer{text-align:center;color:var(--muted);font-size:13px;margin-top:46px;padding:24px 18px 0;border-top:1px solid var(--line);max-width:1120px;margin-left:auto;margin-right:auto}
  footer b{color:var(--gold-soft)}

  @media (max-width:640px){
    .tabs{flex-wrap:nowrap;justify-content:flex-start;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;gap:8px}
    .tabs::-webkit-scrollbar{display:none}
    .tab-btn{flex:0 0 auto;min-width:84px;scroll-snap-align:center;padding:11px 14px}
    .wrap{padding:24px 14px 0}
    .cards{grid-template-columns:1fr;gap:14px}
    .thumb{height:240px}
    .thumb svg{height:216px}
    .card:hover{transform:none}
  }
</style>
</head>
<body>

<header>
  <div class="brand">YD <span>GAINS</span></div>
  <div class="tagline">Gold's Gym · 6-Day Push / Legs / Pull</div>
</header>

<nav class="tabs" id="tabs"></nav>

<main class="wrap" id="content"></main>

<footer>
  Each exercise shows the muscles it trains — <b>bright gold</b> is the primary target, <b>dim gold</b> assists.
  Loads are starting suggestions; add weight when all sets feel easy with 1–2 reps left in the tank. No exercise repeats across the week. Built for YD 💪
</footer>

<script>
/* ============================================================
   ANATOMY FIGURE  — front + back body, muscles colour-coded
   ============================================================ */
const MUS = {
  pec:'Chest', fdelt:'Front Delts', sdelt:'Side Delts', rdelt:'Rear Delts',
  trap:'Traps', lat:'Lats', biceps:'Biceps', triceps:'Triceps', forearm:'Forearms',
  abs:'Abs', oblique:'Obliques', lowerback:'Lower Back', quad:'Quads',
  hamstring:'Hamstrings', glute:'Glutes', calf:'Calves', shin:'Shins'
};

function silhouette(){return `
 <g fill="#2b2b33">
  <circle cx="50" cy="15" r="10"/>
  <rect x="46" y="22" width="8" height="8" rx="3"/>
  <path d="M32,33 Q50,29 68,33 L64,72 Q60,98 56,114 L44,114 Q40,98 36,72 Z"/>
  <path d="M34,35 Q24,37 22,50 L18,94 Q17,114 21,130 L27,130 Q29,112 30,94 L33,56 Z"/>
  <path d="M66,35 Q76,37 78,50 L82,94 Q83,114 79,130 L73,130 Q71,112 70,94 L67,56 Z"/>
  <path d="M44,114 L36,118 Q33,150 35,182 L34,212 Q35,232 41,233 L48,233 Q49,205 49,178 L50,116 Z"/>
  <path d="M56,114 L64,118 Q67,150 65,182 L66,212 Q65,232 59,233 L52,233 Q51,205 51,178 L50,116 Z"/>
 </g>`;}

function frontMuscles(c){return `
 <g stroke="#1e1e24" stroke-width="0.5">
  <ellipse cx="27" cy="42" rx="6" ry="7" fill="${c('sdelt')}"/><ellipse cx="73" cy="42" rx="6" ry="7" fill="${c('sdelt')}"/>
  <ellipse cx="34" cy="44" rx="5" ry="6" fill="${c('fdelt')}"/><ellipse cx="66" cy="44" rx="5" ry="6" fill="${c('fdelt')}"/>
  <ellipse cx="43" cy="55" rx="8" ry="7" fill="${c('pec')}"/><ellipse cx="57" cy="55" rx="8" ry="7" fill="${c('pec')}"/>
  <ellipse cx="24" cy="64" rx="4.5" ry="12" fill="${c('biceps')}"/><ellipse cx="76" cy="64" rx="4.5" ry="12" fill="${c('biceps')}"/>
  <ellipse cx="21" cy="98" rx="4" ry="13" fill="${c('forearm')}"/><ellipse cx="79" cy="98" rx="4" ry="13" fill="${c('forearm')}"/>
  <rect x="44" y="64" width="12" height="42" rx="3" fill="${c('abs')}"/>
  <ellipse cx="39" cy="84" rx="3" ry="11" fill="${c('oblique')}"/><ellipse cx="61" cy="84" rx="3" ry="11" fill="${c('oblique')}"/>
  <ellipse cx="43" cy="150" rx="7" ry="28" fill="${c('quad')}"/><ellipse cx="57" cy="150" rx="7" ry="28" fill="${c('quad')}"/>
  <ellipse cx="42" cy="200" rx="4" ry="17" fill="${c('shin')}"/><ellipse cx="58" cy="200" rx="4" ry="17" fill="${c('shin')}"/>
  <g stroke="#2b2b33" stroke-width="1" fill="none">
    <line x1="50" y1="66" x2="50" y2="104"/><line x1="45" y1="77" x2="55" y2="77"/><line x1="45" y1="88" x2="55" y2="88"/><line x1="45" y1="98" x2="55" y2="98"/>
  </g>
 </g>`;}

function backMuscles(c){return `
 <g stroke="#1e1e24" stroke-width="0.5">
  <path d="M50,26 L37,36 L41,56 L50,50 L59,56 L63,36 Z" fill="${c('trap')}"/>
  <ellipse cx="28" cy="43" rx="6" ry="7" fill="${c('rdelt')}"/><ellipse cx="72" cy="43" rx="6" ry="7" fill="${c('rdelt')}"/>
  <ellipse cx="24" cy="64" rx="4.5" ry="12" fill="${c('triceps')}"/><ellipse cx="76" cy="64" rx="4.5" ry="12" fill="${c('triceps')}"/>
  <path d="M38,56 L31,60 Q34,86 45,96 L47,78 L43,58 Z" fill="${c('lat')}"/>
  <path d="M62,56 L69,60 Q66,86 55,96 L53,78 L57,58 Z" fill="${c('lat')}"/>
  <rect x="44" y="92" width="12" height="20" rx="3" fill="${c('lowerback')}"/>
  <ellipse cx="43" cy="122" rx="8" ry="10" fill="${c('glute')}"/><ellipse cx="57" cy="122" rx="8" ry="10" fill="${c('glute')}"/>
  <ellipse cx="43" cy="162" rx="7" ry="24" fill="${c('hamstring')}"/><ellipse cx="57" cy="162" rx="7" ry="24" fill="${c('hamstring')}"/>
  <ellipse cx="43" cy="202" rx="6" ry="17" fill="${c('calf')}"/><ellipse cx="57" cy="202" rx="6" ry="17" fill="${c('calf')}"/>
 </g>`;}

function fig(prim, sec){
  const P = new Set(prim||[]), S = new Set(sec||[]);
  const c = k => P.has(k) ? '#edc043' : (S.has(k) ? '#806a2c' : '#41414c');
  const lab = 'font-size="8" fill="#7a7a86" text-anchor="middle" font-family="Oswald,sans-serif" letter-spacing="1"';
  return `<svg viewBox="0 0 210 248" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Muscle map">
    <g>${silhouette()}${frontMuscles(c)}<text x="50" y="246" ${lab}>FRONT</text></g>
    <g transform="translate(110,0)">${silhouette()}${backMuscles(c)}<text x="50" y="246" ${lab}>BACK</text></g>
  </svg>`;
}

/* ============================================================
   WARM-UPS  (per training type)
   ============================================================ */
const WARMUPS = {
  push:{
    note:"<b>5 min</b> easy cardio to raise body temp, then the mobility + ramp-up sets below. Warm shoulders, elbows and chest before you press heavy — never take your first hard set cold.",
    items:[
      {name:"Treadmill / Bike",sets:"5 min",reps:"easy",prim:[],sec:["quad","hamstring","calf"],steps:["Light pace until you break a sweat and breathe a little harder."]},
      {name:"Band Pull-Apart + Arm Circles",sets:"2",reps:"15",prim:["rdelt"],sec:["sdelt","trap"],steps:["Wake up the rear delts and rotator cuff before pressing."]},
      {name:"Push-Ups",sets:"2",reps:"10–12",prim:["pec"],sec:["triceps","fdelt"],steps:["Slow, controlled reps to prime the chest and triceps."]},
      {name:"Empty Bar Bench Press",sets:"1",reps:"15",prim:["pec"],sec:["fdelt","triceps"],steps:["Just the 20 kg bar — groove your exact bar path."]},
      {name:"Ramp-Up Set 1",sets:"1",reps:"8",prim:["pec"],sec:["fdelt","triceps"],steps:["≈ 50% of your working weight."]},
      {name:"Ramp-Up Set 2",sets:"1",reps:"5",prim:["pec"],sec:["fdelt","triceps"],steps:["≈ 70% of working weight, then start your work sets."]},
    ],
  },
  legs:{
    note:"<b>5 min</b> on the bike, then open the hips, knees and ankles. Legs need the most thorough warm-up — ramp the squat in stages so your first heavy set feels strong.",
    items:[
      {name:"Stationary Bike",sets:"5 min",reps:"moderate",prim:[],sec:["quad","hamstring","calf"],steps:["Get blood into the quads and hamstrings."]},
      {name:"Bodyweight Squats",sets:"2",reps:"15",prim:["quad","glute"],sec:["hamstring"],steps:["Full depth, knees tracking over your toes."]},
      {name:"Leg Swings",sets:"2",reps:"12 / leg",prim:["hamstring","glute"],sec:["quad"],steps:["Front-to-back and side-to-side to loosen the hips."]},
      {name:"Empty Bar Squat",sets:"1",reps:"12",prim:["quad","glute"],sec:["hamstring","lowerback"],steps:["Just the bar (20 kg) — rehearse depth and brace."]},
      {name:"Ramp-Up Set 1",sets:"1",reps:"8",prim:["quad","glute"],sec:["hamstring"],steps:["≈ 50% of working weight."]},
      {name:"Ramp-Up Set 2",sets:"1",reps:"5",prim:["quad","glute"],sec:["hamstring"],steps:["≈ 70%, then begin your work sets."]},
    ],
  },
  pull:{
    note:"<b>5 min</b> cardio, then activate the lats and upper back so you pull with your back — not just your arms. Light work protects the lower back on rows.",
    items:[
      {name:"Rower / Bike",sets:"5 min",reps:"easy",prim:[],sec:["lat","quad","hamstring"],steps:["The rowing machine doubles as a back primer."]},
      {name:"Band Pull-Apart",sets:"2",reps:"15",prim:["rdelt"],sec:["trap"],steps:["Squeeze the shoulder blades together each rep."]},
      {name:"Scapular Pulls (dead hang)",sets:"2",reps:"10",prim:["lat"],sec:["trap"],steps:["From a hang, pull shoulders down — no elbow bend."]},
      {name:"Light Lat Pulldown",sets:"1",reps:"15",prim:["lat"],sec:["biceps"],steps:["Feel the lats stretch at the top and contract at the bottom."]},
      {name:"Ramp-Up Set 1",sets:"1",reps:"8",prim:["lat"],sec:["biceps","rdelt"],steps:["≈ 50% of your first lift's working weight."]},
      {name:"Ramp-Up Set 2",sets:"1",reps:"5",prim:["lat"],sec:["biceps","rdelt"],steps:["≈ 70%, then start your work sets."]},
    ],
  },
};

/* ============================================================
   WORKOUT — 36 UNIQUE EXERCISES (no movement repeats in a week)
   ============================================================ */
const DAYS = [
  { day:"Monday", type:"push", title:"Push A", focus:"Chest · Shoulders · Triceps — strength focus",
    exercises:[
      {name:"Barbell Bench Press",sets:"4",reps:"6–8",load:"32–40 kg",prim:["pec"],sec:["fdelt","triceps"],
        steps:["Lie flat, eyes under the bar, grip just wider than shoulders.","Pull shoulder blades back & down, plant your feet.","Lower the bar to mid-chest, then press up and slightly back."]},
      {name:"Incline Dumbbell Press",sets:"3",reps:"8–10",load:"12–16 kg ×2",prim:["pec","fdelt"],sec:["triceps"],
        steps:["Set the bench to 30°, dumbbells at shoulder level.","Press up and slightly together — don't clank them.","Lower under control into a deep stretch."]},
      {name:"Seated Dumbbell Shoulder Press",sets:"3",reps:"8–10",load:"10–14 kg ×2",prim:["fdelt"],sec:["sdelt","triceps"],
        steps:["Sit upright, back on the pad, dumbbells at ear height.","Press overhead without locking out hard.","Keep ribs down — don't arch the lower back."]},
      {name:"Cable Lateral Raise",sets:"3",reps:"12–15",load:"2.5–5 kg",prim:["sdelt"],sec:[],
        steps:["Stand side-on to a low pulley, cable across your body.","Lead with the elbow, raise to shoulder height.","Lower slowly — no swinging."]},
      {name:"Triceps Rope Pushdown",sets:"3",reps:"10–12",load:"15–25 kg",prim:["triceps"],sec:[],
        steps:["Pin your elbows to your sides, grab the rope.","Push down and spread the rope apart at the bottom.","Control it back up to about 90°."]},
      {name:"Overhead Dumbbell Triceps Extension",sets:"3",reps:"10–12",load:"8–12 kg",prim:["triceps"],sec:[],
        steps:["Hold one dumbbell overhead with both hands.","Lower it behind your head for a deep stretch.","Extend fully, keeping elbows pointing forward."]},
    ]},
  { day:"Tuesday", type:"legs", title:"Legs A", focus:"Quads · Hamstrings · Calves — squat focus",
    exercises:[
      {name:"Barbell Back Squat",sets:"4",reps:"6–8",load:"40–50 kg",prim:["quad","glute"],sec:["hamstring","lowerback"],
        steps:["Bar on your upper traps, feet shoulder-width, toes slightly out.","Brace your core and sit your hips down between your knees.","Hit at least parallel, then drive up through mid-foot."]},
      {name:"Leg Press",sets:"3",reps:"10–12",load:"machine",prim:["quad"],sec:["glute","hamstring"],
        steps:["Feet mid-platform, shoulder-width, back flat on the pad.","Lower until knees reach ~90° — don't let hips curl.","Press through your heels; don't lock the knees hard."]},
      {name:"Romanian Deadlift",sets:"3",reps:"8–10",load:"30–40 kg",prim:["hamstring","glute"],sec:["lowerback"],
        steps:["Bar at your hips, soft knees, flat back.","Push your hips back, keeping the bar close.","Feel the hamstring stretch, then drive the hips forward."]},
      {name:"Leg Extension",sets:"3",reps:"12–15",load:"machine",prim:["quad"],sec:[],
        steps:["Pad on your lower shins, knees at the seat pivot.","Extend to straight and squeeze your quads at the top.","Lower slowly under control."]},
      {name:"Seated Leg Curl",sets:"3",reps:"12–15",load:"machine",prim:["hamstring"],sec:[],
        steps:["Pad on your lower calves, thighs strapped down.","Curl your heels under the seat to a full contraction.","Return slowly — don't let the stack drop."]},
      {name:"Standing Calf Raise",sets:"4",reps:"15–20",load:"machine",prim:["calf"],sec:[],
        steps:["Balls of feet on the platform, shoulders under the pads.","Drop your heels for a full stretch.","Rise as high as possible and pause at the top."]},
    ]},
  { day:"Wednesday", type:"pull", title:"Pull A", focus:"Back · Rear Delts · Biceps — width focus",
    exercises:[
      {name:"Lat Pulldown",sets:"4",reps:"8–10",load:"machine",prim:["lat"],sec:["biceps","rdelt"],
        steps:["Grip wider than shoulders, thighs under the pads.","Pull the bar to your upper chest, driving elbows down.","Control it back up to a full overhead stretch."]},
      {name:"Barbell Bent-Over Row",sets:"3",reps:"8–10",load:"30–40 kg",prim:["lat","trap"],sec:["biceps","lowerback"],
        steps:["Hinge to ~45° with a flat back, bar at your shins.","Pull to your belly button, elbows driving back.","Lower under control, keeping the back braced."]},
      {name:"Seated Cable Row",sets:"3",reps:"10–12",load:"machine",prim:["lat","trap"],sec:["biceps"],
        steps:["Chest tall, slight knee bend, grab the handle.","Pull to your stomach and squeeze the shoulder blades.","Don't heave with the lower back."]},
      {name:"Face Pull",sets:"3",reps:"15",load:"light cable",prim:["rdelt"],sec:["trap"],
        steps:["Rope at face height, thumbs pointing back.","Pull toward your forehead with elbows high.","Squeeze the rear delts, then return slowly."]},
      {name:"Dumbbell Bicep Curl",sets:"3",reps:"10–12",load:"8–12 kg",prim:["biceps"],sec:["forearm"],
        steps:["Stand tall, arms at your sides, palms forward.","Curl up without swinging your elbows.","Squeeze at the top, then lower slowly."]},
      {name:"Hammer Curl",sets:"3",reps:"10–12",load:"8–12 kg",prim:["biceps","forearm"],sec:[],
        steps:["Neutral grip — palms facing each other.","Curl up keeping the wrists straight.","Lower with a 2-count, no swinging."]},
    ]},
  { day:"Thursday", type:"push", title:"Push B", focus:"Chest · Shoulders · Triceps — hypertrophy focus",
    exercises:[
      {name:"Incline Barbell Press",sets:"4",reps:"8–10",load:"25–32 kg",prim:["pec","fdelt"],sec:["triceps"],
        steps:["Bench at 30°, grip slightly wider than shoulders.","Lower the bar to your upper chest, elbows ~45°.","Drive up and slightly back, over your face."]},
      {name:"Flat Dumbbell Press",sets:"3",reps:"10–12",load:"14–18 kg ×2",prim:["pec"],sec:["fdelt","triceps"],
        steps:["Lie flat, dumbbells over your chest, feet planted.","Lower to chest level for a full stretch.","Press up, squeezing the chest at the top."]},
      {name:"Pec Dec Machine Fly",sets:"3",reps:"12–15",load:"machine",prim:["pec"],sec:["fdelt"],
        steps:["Set the seat so the handles are at chest height.","With a slight elbow bend, bring the handles together.","Pause and squeeze, then open slowly."]},
      {name:"Dumbbell Lateral Raise",sets:"4",reps:"12–15",load:"4–7 kg",prim:["sdelt"],sec:[],
        steps:["Stand tall, light dumbbells at your sides.","Raise out to shoulder height, pinkies slightly up.","Lower slowly — control beats heavy here."]},

/* ============================================================
   RENDER
   ============================================================ */
const tabsEl = document.getElementById('tabs');
const contentEl = document.getElementById('content');

function muscleNames(arr){ return (arr||[]).map(k=>MUS[k]).filter(Boolean); }

function card(ex, n, badge){
  const primNames = muscleNames(ex.prim);
  const secNames  = muscleNames(ex.sec);
  const targetLine = primNames.length ? primNames.join(' · ') : 'General / Mobility';
  return `
  <div class="card">
    <div class="thumb">
      <span class="exnum">${n}</span>
      ${badge ? `<span class="badge">${badge}</span>` : ``}
      ${fig(ex.prim, ex.sec)}
    </div>
    <div class="card-body">
      <div class="ex-name">${ex.name}</div>
      <div class="ex-target">${targetLine}</div>
      ${secNames.length ? `<div class="ex-also">assists: <b>${secNames.join(', ')}</b></div>` : ``}
      <div class="ex-meta">
        <span class="pill"><b>${ex.sets}</b> sets</span>
        <span class="pill"><b>${ex.reps}</b> reps</span>
        ${ex.load ? `<span class="pill"><b>${ex.load}</b></span>` : ``}
      </div>
      <ol class="steps">${ex.steps.map(s=>`<li>${s}</li>`).join('')}</ol>
    </div>
  </div>`;
}

function renderDay(i){
  const d = DAYS[i];
  const w = WARMUPS[d.type];
  contentEl.innerHTML = `
    <div class="day-head">
      <span class="daytag">${d.day}</span>
      <span class="day-title">${d.title}</span>
    </div>
    <div class="day-focus">${d.focus}</div>
    <div class="legend">
      <span><i class="sw-p"></i>Primary muscle</span>
      <span><i class="sw-s"></i>Assisting muscle</span>
      <span><i class="sw-i"></i>Not targeted</span>
    </div>

    <div class="section-label"><span class="dot"></span>Warm-Up — do this first</div>
    <div class="warm-intro">${w.note}</div>
    <div class="cards">${w.items.map((e,idx)=>card(e, idx+1, 'Warm-up')).join('')}</div>

    <div class="section-label"><span class="dot"></span>Workout — 6 exercises</div>
    <div class="cards">${d.exercises.map((e,idx)=>card(e, idx+1)).join('')}</div>
  `;
  contentEl.scrollIntoView({behavior:'smooth', block:'start'});
}

DAYS.forEach((d,i)=>{
  const b = document.createElement('button');
  b.className = 'tab-btn' + (i===0 ? ' active' : '');
  b.innerHTML = `${d.day.slice(0,3)}<small>${d.title}</small>`;
  b.onclick = ()=>{
    document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    renderDay(i);
  };
  tabsEl.appendChild(b);
});

renderDay(0);
</script>
