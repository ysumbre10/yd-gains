<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0b0b0d" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="format-detection" content="telephone=no" />
<title>YD Gains · Gold's Gym Training Split</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --gold:#d4af37;
    --gold-soft:#e8c860;
    --bg:#0b0b0d;
    --bg-2:#141418;
    --card:#1b1b21;
    --card-2:#22222a;
    --line:#2c2c35;
    --text:#f4f4f5;
    --muted:#a1a1aa;
    --prim:#edc043;
    --sec:#806a2c;
    --shadow:0 18px 40px rgba(0,0,0,.45);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html{scroll-behavior:smooth;-webkit-text-size-adjust:100%;text-size-adjust:100%}
  body{
    background:radial-gradient(1200px 600px at 50% -10%, #1a1a20 0%, var(--bg) 55%);
    color:var(--text);
    font-family:'Inter',system-ui,sans-serif;
    min-height:100vh;
    padding-bottom:calc(96px + env(safe-area-inset-bottom));
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.brand,.tab-btn,.daytag,.exnum{font-family:'Oswald',sans-serif;letter-spacing:.5px}

  /* ---------- Header ---------- */
  header{
    text-align:center;
    padding:42px 20px 26px;
    border-bottom:1px solid var(--line);
    background:linear-gradient(180deg, rgba(212,175,55,.06), transparent);
  }
  .brand{font-size:clamp(34px,6vw,58px);font-weight:700;text-transform:uppercase;line-height:1}
  .brand span{color:var(--gold)}
  .tagline{color:var(--muted);margin-top:10px;font-size:14px;letter-spacing:2px;text-transform:uppercase}
  .today-line{margin-top:9px;font-size:13px;color:var(--gold-soft);letter-spacing:1px;font-weight:500}

  /* ---------- Tabs ---------- */
  .tabs{
    position:sticky;top:0;z-index:20;
    display:flex;gap:6px;justify-content:center;flex-wrap:wrap;
    padding:14px 14px;
    padding-top:calc(14px + env(safe-area-inset-top));
    background:rgba(11,11,13,.92);
    backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);
  }
  .tab-btn{
    cursor:pointer;border:1px solid var(--line);background:var(--card);
    color:var(--muted);border-radius:12px;padding:10px 16px;
    font-size:15px;font-weight:600;text-transform:uppercase;
    transition:.18s ease;min-width:104px;text-align:center;line-height:1.2;
    position:relative;
  }
  .tab-btn.today::before{content:"";position:absolute;top:6px;right:7px;width:7px;height:7px;border-radius:50%;background:var(--gold);box-shadow:0 0 0 2px var(--card)}
  .tab-btn.today.active::before{background:#1a1a1a;box-shadow:0 0 0 2px var(--gold-soft)}
  .tab-btn small{display:block;font-size:11px;font-family:'Inter';letter-spacing:.5px;opacity:.7;font-weight:500}
  .tab-btn:hover{border-color:var(--gold);color:var(--text);transform:translateY(-1px)}
  .tab-btn.active{
    background:linear-gradient(180deg,var(--gold),#b8932b);
    color:#1a1a1a;border-color:var(--gold);box-shadow:0 6px 18px rgba(212,175,55,.3);
  }
  .tab-btn.active small{opacity:.85}

  /* ---------- Day content ---------- */
  .wrap{max-width:1120px;margin:0 auto;padding:30px 18px 0}
  .day-head{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:6px}
  .daytag{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:#1a1a1a;background:var(--gold);padding:5px 12px;border-radius:8px}
  .day-title{font-size:clamp(26px,4vw,38px);font-weight:700;text-transform:uppercase}
  .day-focus{color:var(--muted);margin:4px 0 12px;font-size:15px}

  .legend{display:flex;gap:18px;margin:0 0 24px;font-size:12.5px;color:var(--muted);flex-wrap:wrap}
  .legend i{display:inline-block;width:13px;height:13px;border-radius:3px;margin-right:7px;vertical-align:-2px;border:1px solid rgba(255,255,255,.12)}
  .sw-p{background:var(--prim)} .sw-s{background:var(--sec)} .sw-i{background:#41414c}

  .section-label{display:flex;align-items:center;gap:12px;margin:34px 0 16px;font-family:'Oswald';font-size:20px;text-transform:uppercase;letter-spacing:1px}
  .section-label::after{content:"";flex:1;height:1px;background:var(--line)}
  .section-label .dot{width:9px;height:9px;border-radius:50%;background:var(--gold)}


  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:16px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:hidden;transition:.18s ease;display:flex;flex-direction:column}
  .card:hover{transform:translateY(-3px);border-color:var(--gold);box-shadow:var(--shadow)}
  .thumb{height:212px;background:radial-gradient(120% 120% at 50% 0%,#22222b,#141419);display:flex;align-items:center;justify-content:center;gap:8px;border-bottom:1px solid var(--line);position:relative;padding:8px}
  .thumb svg{height:96%;width:auto;max-width:100%}
  /* exercise demo photo (start/finish frames crossfade to show the movement) */
  .demo{flex:1.25;position:relative;height:100%;border-radius:10px;overflow:hidden;background:#f1f1f3;border:1px solid var(--line)}
  .demo img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain}
  .demo .f1{animation:swap 2.6s ease-in-out infinite}
  @keyframes swap{0%,42%{opacity:1}58%,100%{opacity:0}}
  .map{flex:1;height:100%;position:relative;display:flex;align-items:center;justify-content:center;border-radius:10px;background:radial-gradient(120% 120% at 50% 0%,#23232c,#15151a);border:1px solid var(--line)}
  .map.full{flex:none;width:auto;max-width:100%;border:none;background:none}
  .demo-cap{position:absolute;bottom:5px;left:0;right:0;text-align:center;font-size:8.5px;letter-spacing:1.5px;color:#6b6b73;text-transform:uppercase;font-family:'Oswald',sans-serif;font-weight:600;pointer-events:none}
  .exnum{position:absolute;top:10px;left:10px;width:30px;height:30px;border-radius:8px;background:var(--gold);color:#1a1a1a;font-weight:700;font-size:15px;display:flex;align-items:center;justify-content:center;z-index:2}
  .card-body{padding:15px 16px 18px;display:flex;flex-direction:column;gap:8px;flex:1}
  .ex-name{font-family:'Oswald';font-size:19px;font-weight:600;line-height:1.2}
  .ex-target{font-size:12px;color:var(--gold-soft);text-transform:uppercase;letter-spacing:.6px;font-weight:600}
  .ex-also{font-size:12px;color:var(--muted);margin-top:-3px}
  .ex-also b{color:#cfcfd6;font-weight:500}
  .ex-meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:3px}
  .pill{background:var(--card-2);border:1px solid var(--line);border-radius:7px;padding:5px 9px;font-size:12px;color:var(--muted)}
  .pill b{color:var(--text);font-weight:600}
  .steps{margin:8px 0 0;padding-left:18px;display:flex;flex-direction:column;gap:5px}
  .steps li{font-size:13px;color:var(--muted);line-height:1.45}
  .steps li::marker{color:var(--gold);font-weight:700}

  .today-pill{font-size:12px;font-weight:600;color:#1a1a1a;background:var(--gold-soft);padding:5px 11px;border-radius:999px;font-family:'Oswald';letter-spacing:.5px;text-transform:uppercase}
  .rest-banner{background:var(--bg-2);border:1px solid var(--line);border-left:3px solid var(--gold);border-radius:12px;padding:14px 16px;margin-bottom:18px;color:var(--muted);font-size:14px;line-height:1.55}
  .rest-banner b{color:var(--text)}

  /* ---------- Rest Timer ---------- */
  .timer-fab{position:fixed;right:16px;bottom:calc(16px + env(safe-area-inset-bottom));z-index:60;height:58px;min-width:58px;padding:0 18px;border-radius:30px;border:none;background:linear-gradient(180deg,var(--gold),#b8932b);color:#1a1a1a;font-family:'Oswald',sans-serif;font-weight:700;font-size:19px;display:flex;align-items:center;justify-content:center;gap:0;box-shadow:0 8px 24px rgba(0,0,0,.5);cursor:pointer}
  .timer-fab.running{background:linear-gradient(180deg,#3fb950,#2c9b42);color:#fff}
  .timer-fab.done{background:linear-gradient(180deg,#e5484d,#c5363b);color:#fff;animation:pulse .6s ease-in-out 4}
  @keyframes pulse{50%{transform:scale(1.08)}}
  .fab-time{font-variant-numeric:tabular-nums}
  .timer-panel{position:fixed;right:16px;bottom:calc(86px + env(safe-area-inset-bottom));z-index:60;width:286px;max-width:calc(100vw - 32px);background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px;box-shadow:0 18px 48px rgba(0,0,0,.6);display:none}
  .timer-panel.open{display:block}
  .tp-head{display:flex;justify-content:space-between;align-items:center;font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:1px;font-size:15px;color:var(--gold-soft)}
  .tp-close{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;line-height:1}
  .tp-display{font-family:'Oswald',sans-serif;font-size:56px;font-weight:700;text-align:center;margin:4px 0 12px;font-variant-numeric:tabular-nums;color:var(--text);line-height:1}
  .tp-display.done{color:#3fb950}
  .tp-presets{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:13px}
  .tp-presets button{flex:1 1 auto;min-width:46px;background:var(--card-2);border:1px solid var(--line);color:var(--muted);border-radius:9px;padding:9px 6px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif}
  .tp-presets button.sel{border-color:var(--gold);color:var(--gold-soft);background:rgba(212,175,55,.13)}
  .tp-controls{display:flex;gap:8px}
  .tp-main{flex:2;background:linear-gradient(180deg,var(--gold),#b8932b);color:#1a1a1a;border:none;border-radius:10px;padding:13px;font-family:'Oswald',sans-serif;font-weight:700;font-size:16px;text-transform:uppercase;cursor:pointer;letter-spacing:.5px}
  .tp-main.pause{background:linear-gradient(180deg,#e0a93f,#c98f2a)}
  .tp-sec{flex:1;background:var(--card-2);border:1px solid var(--line);color:var(--text);border-radius:10px;padding:13px 4px;font-size:13px;font-weight:600;cursor:pointer}

  /* ---------- Set logger ---------- */
  .logger{margin-top:13px;border-top:1px solid var(--line);padding-top:12px;display:flex;flex-direction:column;gap:7px}
  .log-head{display:flex;justify-content:space-between;font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:1px;font-size:12.5px;color:var(--gold-soft)}
  .log-head .log-x{color:var(--muted);letter-spacing:.5px}
  .log-row{display:grid;grid-template-columns:26px 1fr 1fr 46px;gap:7px;align-items:center}
  .log-row .set-no{font-family:'Oswald',sans-serif;font-weight:700;color:var(--muted);text-align:center;font-size:14px}
  .log-row input{width:100%;background:var(--card-2);border:1px solid var(--line);border-radius:8px;color:var(--text);padding:9px 8px;font-size:15px;font-family:'Inter',sans-serif;text-align:center;-moz-appearance:textfield;appearance:textfield}
  .log-row input::-webkit-outer-spin-button,.log-row input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  .log-row input::placeholder{color:#6b6b73}
  .log-row input:focus{outline:none;border-color:var(--gold)}
  .log-done{background:var(--card-2);border:1px solid var(--line);border-radius:8px;height:38px;cursor:pointer;font-size:17px;font-weight:700;line-height:1;display:flex;align-items:center;justify-content:center;color:#1a1a1a}
  .log-done::before{content:"✓";color:var(--muted);opacity:.32}
  .log-row.done .log-done{background:linear-gradient(180deg,var(--gold),#b8932b);border-color:var(--gold)}
  .log-row.done .log-done::before{color:#1a1a1a;opacity:1}
  .log-row.done input{border-color:rgba(212,175,55,.5);background:rgba(212,175,55,.08)}
  .log-row.done .set-no{color:var(--gold-soft)}
  .unit-toggle{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .unit-btn{background:var(--card-2);border:none;color:var(--muted);font-family:'Oswald',sans-serif;font-size:12.5px;font-weight:600;letter-spacing:.5px;padding:5px 12px;cursor:pointer;text-transform:uppercase}
  .unit-btn.on{background:var(--gold);color:#1a1a1a}
  .log-row.td{margin-top:1px}
  .log-row.td .set-no{color:var(--gold-soft);font-size:12px;font-weight:700}
  .log-row.td input{border-style:dashed;border-color:rgba(212,175,55,.32)}
  .td-note{font-size:11.5px;color:var(--muted);margin-top:3px;line-height:1.45}
  .td-note b{color:var(--gold-soft)}
  .td-pill{color:var(--gold-soft);border-color:rgba(212,175,55,.4)!important}

  /* ---------- Progress / results ---------- */
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 10px;text-align:center}
  .stat .v{font-family:'Oswald',sans-serif;font-size:clamp(24px,6vw,32px);font-weight:700;color:var(--gold);line-height:1}
  .stat .l{font-size:11.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:6px}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;margin-top:16px}
  .panel h3{font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:1px;font-size:18px;margin-bottom:14px;display:flex;align-items:center;gap:10px;justify-content:space-between;flex-wrap:wrap}
  .panel h3 small{color:var(--muted);font-size:12.5px;font-family:'Inter',sans-serif;letter-spacing:.3px;text-transform:none}
  .chart svg{width:100%;height:auto;display:block}
  .ex-select{background:var(--card-2);border:1px solid var(--line);color:var(--text);border-radius:9px;padding:8px 10px;font-size:14px;font-family:'Inter',sans-serif;max-width:62%}
  .empty{color:var(--muted);text-align:center;padding:26px 8px;font-size:14px;line-height:1.6}
  .sess-list{display:flex;flex-direction:column;gap:8px}
  .sess{display:flex;justify-content:space-between;align-items:center;background:var(--card-2);border:1px solid var(--line);border-radius:10px;padding:10px 13px;font-size:14px}
  .sess .s-d{font-family:'Oswald',sans-serif;letter-spacing:.5px}
  .sess .s-m{color:var(--muted);font-size:12.5px}
  .prog-tab.active{background:linear-gradient(180deg,var(--gold-soft),var(--gold));}

  footer{text-align:center;color:var(--muted);font-size:13px;margin-top:46px;padding:24px 18px 0;border-top:1px solid var(--line);max-width:1120px;margin-left:auto;margin-right:auto}
  footer b{color:var(--gold-soft)}

  @media (max-width:640px){
    .tabs{flex-wrap:nowrap;justify-content:flex-start;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;gap:8px}
    .tabs::-webkit-scrollbar{display:none}
    .tab-btn{flex:0 0 auto;min-width:84px;scroll-snap-align:center;padding:11px 14px}
    .wrap{padding:24px 14px 0}
    .cards{grid-template-columns:1fr;gap:14px}
    .thumb{height:230px}
    .card:hover{transform:none}
  }
</style>
</head>
<body>

<header>
  <div class="brand">YD <span>GAINS</span></div>
  <div class="tagline">Gold's Gym · 6-Day Push / Legs / Pull</div>
  <div class="today-line" id="todayLine"></div>
</header>

<nav class="tabs" id="tabs"></nav>

<main class="wrap" id="content"></main>

<footer>
  Built for YD 💪
</footer>

<!-- Rest timer -->
<button class="timer-fab" id="timerFab" aria-label="Rest timer"><span id="fabIcon">⏱</span><span class="fab-time" id="fabTime"></span></button>
<div class="timer-panel" id="timerPanel">
  <div class="tp-head"><span>Rest Timer</span><button class="tp-close" id="tpClose" aria-label="Close">✕</button></div>
  <div class="tp-display" id="tpDisplay">1:30</div>
  <div class="tp-presets">
    <button data-sec="45">0:45</button>
    <button data-sec="60">1:00</button>
    <button data-sec="90">1:30</button>
    <button data-sec="120">2:00</button>
    <button data-sec="180">3:00</button>
  </div>
  <div class="tp-controls">
    <button class="tp-main" id="tpToggle">Start</button>
    <button class="tp-sec" id="tpAdd">+15s</button>
    <button class="tp-sec" id="tpReset">Reset</button>
  </div>
</div>

<script>
/* ============================================================
   ANATOMY FIGURE  — front + back body, muscles colour-coded
   ============================================================ */
const MUS = {
  pec:'Chest', fdelt:'Front Delts', sdelt:'Side Delts', rdelt:'Rear Delts',
  trap:'Traps', lat:'Lats', biceps:'Biceps', triceps:'Triceps', forearm:'Forearms',
  abs:'Abs', oblique:'Obliques', lowerback:'Lower Back', quad:'Quads',
  hamstring:'Hamstrings', glute:'Glutes', calf:'Calves', shin:'Shins'
};

function silhouette(){return `
 <g fill="#2b2b33">
  <circle cx="50" cy="15" r="10"/>
  <rect x="46" y="22" width="8" height="8" rx="3"/>
  <path d="M32,33 Q50,29 68,33 L64,72 Q60,98 56,114 L44,114 Q40,98 36,72 Z"/>
  <path d="M34,35 Q24,37 22,50 L18,94 Q17,114 21,130 L27,130 Q29,112 30,94 L33,56 Z"/>
  <path d="M66,35 Q76,37 78,50 L82,94 Q83,114 79,130 L73,130 Q71,112 70,94 L67,56 Z"/>
  <path d="M44,114 L36,118 Q33,150 35,182 L34,212 Q35,232 41,233 L48,233 Q49,205 49,178 L50,116 Z"/>
  <path d="M56,114 L64,118 Q67,150 65,182 L66,212 Q65,232 59,233 L52,233 Q51,205 51,178 L50,116 Z"/>
 </g>`;}

function frontMuscles(c){return `
 <g stroke="#1e1e24" stroke-width="0.5">
  <ellipse cx="27" cy="42" rx="6" ry="7" fill="${c('sdelt')}"/><ellipse cx="73" cy="42" rx="6" ry="7" fill="${c('sdelt')}"/>
  <ellipse cx="34" cy="44" rx="5" ry="6" fill="${c('fdelt')}"/><ellipse cx="66" cy="44" rx="5" ry="6" fill="${c('fdelt')}"/>
  <ellipse cx="43" cy="55" rx="8" ry="7" fill="${c('pec')}"/><ellipse cx="57" cy="55" rx="8" ry="7" fill="${c('pec')}"/>
  <ellipse cx="24" cy="64" rx="4.5" ry="12" fill="${c('biceps')}"/><ellipse cx="76" cy="64" rx="4.5" ry="12" fill="${c('biceps')}"/>
  <ellipse cx="21" cy="98" rx="4" ry="13" fill="${c('forearm')}"/><ellipse cx="79" cy="98" rx="4" ry="13" fill="${c('forearm')}"/>
  <rect x="44" y="64" width="12" height="42" rx="3" fill="${c('abs')}"/>
  <ellipse cx="39" cy="84" rx="3" ry="11" fill="${c('oblique')}"/><ellipse cx="61" cy="84" rx="3" ry="11" fill="${c('oblique')}"/>
  <ellipse cx="43" cy="150" rx="7" ry="28" fill="${c('quad')}"/><ellipse cx="57" cy="150" rx="7" ry="28" fill="${c('quad')}"/>
  <ellipse cx="42" cy="200" rx="4" ry="17" fill="${c('shin')}"/><ellipse cx="58" cy="200" rx="4" ry="17" fill="${c('shin')}"/>
  <g stroke="#2b2b33" stroke-width="1" fill="none">
    <line x1="50" y1="66" x2="50" y2="104"/><line x1="45" y1="77" x2="55" y2="77"/><line x1="45" y1="88" x2="55" y2="88"/><line x1="45" y1="98" x2="55" y2="98"/>
  </g>
 </g>`;}

function backMuscles(c){return `
 <g stroke="#1e1e24" stroke-width="0.5">
  <path d="M50,26 L37,36 L41,56 L50,50 L59,56 L63,36 Z" fill="${c('trap')}"/>
  <ellipse cx="28" cy="43" rx="6" ry="7" fill="${c('rdelt')}"/><ellipse cx="72" cy="43" rx="6" ry="7" fill="${c('rdelt')}"/>
  <ellipse cx="24" cy="64" rx="4.5" ry="12" fill="${c('triceps')}"/><ellipse cx="76" cy="64" rx="4.5" ry="12" fill="${c('triceps')}"/>
  <path d="M38,56 L31,60 Q34,86 45,96 L47,78 L43,58 Z" fill="${c('lat')}"/>
  <path d="M62,56 L69,60 Q66,86 55,96 L53,78 L57,58 Z" fill="${c('lat')}"/>
  <rect x="44" y="92" width="12" height="20" rx="3" fill="${c('lowerback')}"/>
  <ellipse cx="43" cy="122" rx="8" ry="10" fill="${c('glute')}"/><ellipse cx="57" cy="122" rx="8" ry="10" fill="${c('glute')}"/>
  <ellipse cx="43" cy="162" rx="7" ry="24" fill="${c('hamstring')}"/><ellipse cx="57" cy="162" rx="7" ry="24" fill="${c('hamstring')}"/>
  <ellipse cx="43" cy="202" rx="6" ry="17" fill="${c('calf')}"/><ellipse cx="57" cy="202" rx="6" ry="17" fill="${c('calf')}"/>
 </g>`;}

function fig(prim, sec){
  const P = new Set(prim||[]), S = new Set(sec||[]);
  const c = k => P.has(k) ? '#edc043' : (S.has(k) ? '#806a2c' : '#41414c');
  const lab = 'font-size="8" fill="#7a7a86" text-anchor="middle" font-family="Oswald,sans-serif" letter-spacing="1"';
  return `<svg viewBox="0 0 210 248" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Muscle map">
    <g>${silhouette()}${frontMuscles(c)}<text x="50" y="246" ${lab}>FRONT</text></g>
    <g transform="translate(110,0)">${silhouette()}${backMuscles(c)}<text x="50" y="246" ${lab}>BACK</text></g>
  </svg>`;
}

/* ============================================================
   SET LOG  +  GOOGLE SHEETS SYNC  +  PROGRESS CHARTS
   localStorage is the source of truth; every set is also
   appended to a Google Sheet (via an Apps Script web app) as
   a permanent backup. See google-apps-script.gs for setup.
   ============================================================ */
const LOG_KEY='ydg_log_v1', Q_KEY='ydg_queue_v1';
/* Google Sheets backend — always on, hidden from the UI. Every set syncs here silently. */
const SHEET_URL='https://script.google.com/macros/s/AKfycbwiRozz1oZjDq339P9sT0KQ20L6mRm2GPRdliorGHQNk8KvwQ8sZOmyPE1J6ruY5uea/exec';
let LOG={}, QUEUE=[], flushing=false;
try{ LOG = JSON.parse(localStorage.getItem(LOG_KEY)) || {}; }catch(e){ LOG={}; }
try{ QUEUE = JSON.parse(localStorage.getItem(Q_KEY)) || []; }catch(e){ QUEUE=[]; }

function persist(){ try{ localStorage.setItem(LOG_KEY, JSON.stringify(LOG)); }catch(e){} }
function persistQ(){ try{ localStorage.setItem(Q_KEY, JSON.stringify(QUEUE)); }catch(e){} }
function getSheetUrl(){ return SHEET_URL; }
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function recKey(date,ex,set){ return date+'::'+ex+'::'+set; }

/* --- read helpers --- */
const KG_PER_LB=0.45359237, UNITS_KEY='ydg_units';
function unitPrefs(){ try{ return JSON.parse(localStorage.getItem(UNITS_KEY))||{}; }catch(e){ return {}; } }
function setUnitPref(ex,u){ try{ const m=unitPrefs(); m[ex]=u; localStorage.setItem(UNITS_KEY,JSON.stringify(m)); }catch(e){} }
function toKg(w,u){ const n=parseFloat(w); return isFinite(n) ? (u==='lb' ? n*KG_PER_LB : n) : NaN; }
function fromKg(kg,u){ return u==='lb' ? kg/KG_PER_LB : kg; }
function allRecords(){ return Object.values(LOG); }
function setVolume(r){ const kg=toKg(r.weight, r.unit||'kg'), x=parseFloat(r.reps); return (isFinite(kg)&&isFinite(x)) ? kg*x : 0; }
function unitFor(ex){ let best=null; for(const r of allRecords()){ if(r.exercise!==ex) continue; if(!best||r.date>best.date) best=r; } if(best&&best.unit) return best.unit; return unitPrefs()[ex] || 'lb'; }
function lastWeightDisp(ex,unit){ let best=null; for(const r of allRecords()){ if(r.exercise!==ex) continue; if(!isFinite(parseFloat(r.weight))) continue; if(!best||r.date>best.date) best=r; } if(!best) return null; return Math.round(fromKg(toKg(best.weight,best.unit||'kg'),unit)*10)/10; }
function sessions(){ const m={}; for(const r of allRecords()){ if(!m[r.date]) m[r.date]={date:r.date,day:r.day,title:r.title,sets:[]}; m[r.date].sets.push(r); } return Object.values(m).sort((a,b)=>a.date<b.date?-1:1); }
function bestExercise(recs){ const c={}; recs.forEach(r=>{ if(isFinite(parseFloat(r.weight))){ (c[r.exercise]=c[r.exercise]||new Set()).add(r.date); } }); let best=null,bn=0; for(const k in c){ if(c[k].size>bn){ bn=c[k].size; best=k; } } return best; }
function shortDate(iso){ const p=String(iso).split('-'); const mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][(+p[1])-1]||''; return (+p[2])+' '+mo; }
function fmtK(v){ v=Math.round(v); return v>=1000 ? (v/1000).toFixed(v>=10000?0:1)+'k' : String(v); }

/* --- write --- */
function saveCell(date,day,title,ex,set,patch){
  const key=recKey(date,ex,set);
  const cur=LOG[key] || {date,day,title,exercise:ex,set,weight:'',reps:'',done:false};
  Object.assign(cur, patch, {date,day,title,exercise:ex,set,ts:Date.now()});
  const blank=(cur.weight===''||cur.weight==null) && (cur.reps===''||cur.reps==null) && !cur.done;
  if(blank){ // typed then cleared — drop it locally and from the pending queue; never sync an empty row
    delete LOG[key]; persist();
    QUEUE=QUEUE.filter(q=>recKey(q.date,q.exercise,q.set)!==key); persistQ();
    return;
  }
  LOG[key]=cur; persist();
  queueSync(cur);
}
let _flushTimer=null;
function scheduleFlush(){ if(_flushTimer) clearTimeout(_flushTimer); _flushTimer=setTimeout(()=>{ _flushTimer=null; flushQueue(); }, 800); }
function queueSync(rec){
  const key=recKey(rec.date, rec.exercise, rec.set);
  QUEUE = QUEUE.filter(q=> recKey(q.date,q.exercise,q.set)!==key); // collapse repeated edits of the same set into one pending row
  QUEUE.push({...rec});
  persistQ();
  scheduleFlush();        // debounce the network call; the queue itself is already saved
}

/* --- Google Sheets (fire-and-forget; no-cors so Apps Script needs no CORS headers) --- */
function sendRec(rec, url){
  url=url||getSheetUrl(); if(!url) return Promise.reject(new Error('no url'));
  const ctrl=(typeof AbortController!=='undefined')?new AbortController():null;
  const timer=ctrl?setTimeout(()=>ctrl.abort(),15000):null; // never let a stalled send wedge the queue
  return fetch(url,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(rec),signal:ctrl?ctrl.signal:undefined})
    .finally(()=>{ if(timer) clearTimeout(timer); });
}
async function flushQueue(){
  const url=getSheetUrl(); if(!url || flushing || !QUEUE.length) return;
  flushing=true;
  try{
    while(QUEUE.length){
      const item=QUEUE[0];
      try{ await sendRec(item, url); }
      catch(e){ break; }   // offline / unreachable — keep the rest, retry later
      const i=QUEUE.indexOf(item); if(i>-1) QUEUE.splice(i,1); // identity-safe removal (queue may have been deduped mid-send)
      persistQ();
    }
  } finally { flushing=false; }
}

/* --- read history back from the sheet (JSONP avoids CORS) so a new device/browser restores everything --- */
function mergeSheet(payload){
  const rows=(payload&&payload.rows)||[];
  let added=0;
  for(const r of rows){
    if(!r || !r.date || !r.exercise || r.set===''||r.set==null) continue;
    const set=String(r.set), key=recKey(String(r.date), r.exercise, set);
    if(LOG[key]) continue;            // a local copy wins — never clobber this device's own edits
    LOG[key]={ date:String(r.date), day:r.day||'', title:r.title||'', exercise:r.exercise, set,
      weight:(r.weight==null?'':r.weight), reps:(r.reps==null?'':r.reps), unit:r.unit||'kg', done:!!r.done, ts:0 };
    added++;
  }
  if(added) persist();
  return added;
}
function pullFromSheet(){
  return new Promise(resolve=>{
    const url=getSheetUrl(); if(!url) return resolve(0);
    const cb='ydgcb_'+Date.now()+'_'+Math.floor(Math.random()*1e6);
    let done=false;
    const s=document.createElement('script');
    const finish=v=>{ if(done) return; done=true; clearTimeout(timer); try{delete window[cb];}catch(e){window[cb]=undefined;} if(s.parentNode) s.parentNode.removeChild(s); resolve(v); };
    const timer=setTimeout(()=>finish(0), 12000);
    window[cb]=payload=>finish(mergeSheet(payload));
    s.onerror=()=>finish(0);
    s.src=url+(url.indexOf('?')>=0?'&':'?')+'callback='+cb+'&t='+Date.now();
    document.body.appendChild(s);
  });
}

/* --- the per-exercise logging block on each workout card --- */
function logger(ex, ctx){
  if(!ctx) return '';
  const sets=Math.min(3, parseInt(ex.sets,10) || 3); // 3 working sets, then a tear-down
  const unit=unitFor(ex.name);
  const lastDisp=lastWeightDisp(ex.name, unit);
  const wph = lastDisp!=null ? esc(lastDisp) : unit;
  const mk=(id,label,repPh,extra)=>`<div class="log-row${extra||''}" data-set="${id}">
      <span class="set-no">${label}</span>
      <input class="log-w" type="number" inputmode="decimal" step="any" placeholder="${wph}" aria-label="${esc(ex.name)} set ${label} weight"/>
      <input class="log-r" type="number" inputmode="numeric" placeholder="${repPh}" aria-label="${esc(ex.name)} set ${label} reps"/>
      <button class="log-done" type="button" aria-label="Mark set ${label} done"></button>
    </div>`;
  let rows='';
  for(let s=1;s<=sets;s++) rows+=mk(String(s), String(s), 'reps', '');
  rows+=mk('TD', 'TD', 'fail', ' td');
  return `<div class="logger" data-ex="${esc(ex.name)}" data-day="${esc(ctx.day)}" data-title="${esc(ctx.title)}" data-unit="${unit}">
    <div class="log-head"><span>Log your sets</span>
      <span class="unit-toggle" role="group" aria-label="Weight unit">
        <button type="button" class="unit-btn${unit==='lb'?' on':''}" data-unit="lb">lb</button>
        <button type="button" class="unit-btn${unit==='kg'?' on':''}" data-unit="kg">kg</button>
      </span>
    </div>
    ${rows}
  </div>`;
}
function hydrateLoggers(){
  contentEl.querySelectorAll('.logger').forEach(L=>{
    const ex=L.dataset.ex;
    L.querySelectorAll('.log-row').forEach(row=>{
      const r=LOG[recKey(TODAY.iso, ex, row.dataset.set)]; if(!r) return;
      if(r.weight!=='' && r.weight!=null) row.querySelector('.log-w').value=r.weight;
      if(r.reps!=='' && r.reps!=null) row.querySelector('.log-r').value=r.reps;
      if(r.done){ row.classList.add('done'); }
    });
  });
}

/* --- delegated input handling (attached once; survives re-renders) --- */
function initLog(){
  contentEl.addEventListener('input', e=>{
    const t=e.target; const row=t.closest && t.closest('.log-row'); if(!row) return;
    const L=row.closest('.logger'); const set=row.dataset.set, unit=L.dataset.unit||'kg';
    if(t.classList.contains('log-w')) saveCell(TODAY.iso,L.dataset.day,L.dataset.title,L.dataset.ex,set,{weight:t.value,unit});
    else if(t.classList.contains('log-r')) saveCell(TODAY.iso,L.dataset.day,L.dataset.title,L.dataset.ex,set,{reps:t.value,unit});
  });
  contentEl.addEventListener('click', e=>{
    const ub=e.target.closest && e.target.closest('.unit-btn');
    if(ub){ switchUnit(ub.closest('.logger'), ub.dataset.unit); return; }
    const btn=e.target.closest && e.target.closest('.log-done'); if(!btn) return;
    const row=btn.closest('.log-row'), L=row.closest('.logger'), set=row.dataset.set, unit=L.dataset.unit||'kg';
    const done=!row.classList.contains('done'); row.classList.toggle('done',done);
    saveCell(TODAY.iso,L.dataset.day,L.dataset.title,L.dataset.ex,set,
      {done, weight:row.querySelector('.log-w').value, reps:row.querySelector('.log-r').value, unit});
  });
  /* number inputs change value on mouse-wheel/trackpad scroll while focused — blur them so scrolling never edits a logged set */
  contentEl.addEventListener('wheel', ()=>{
    const a=document.activeElement;
    if(a && a.tagName==='INPUT' && a.type==='number') a.blur();
  }, {passive:true});
  /* retry any pending rows whenever the app comes back online or to the foreground */
  window.addEventListener('online', flushQueue);
  window.addEventListener('focus', flushQueue);
  document.addEventListener('visibilitychange', ()=>{ if(document.visibilityState==='visible') flushQueue(); });
  flushQueue();
}
function switchUnit(L, unit){
  if(!L || L.dataset.unit===unit) return;
  L.dataset.unit=unit; setUnitPref(L.dataset.ex, unit);
  L.querySelectorAll('.unit-btn').forEach(b=>b.classList.toggle('on', b.dataset.unit===unit));
  const lastDisp=lastWeightDisp(L.dataset.ex, unit);
  const wph = lastDisp!=null ? String(lastDisp) : unit;
  L.querySelectorAll('.log-w').forEach(inp=>inp.placeholder=wph);
  /* re-stamp the unit on any sets already logged today for this exercise (correcting the label, keeping the number) */
  L.querySelectorAll('.log-row').forEach(row=>{
    if(LOG[recKey(TODAY.iso, L.dataset.ex, row.dataset.set)])
      saveCell(TODAY.iso,L.dataset.day,L.dataset.title,L.dataset.ex,row.dataset.set,{unit});
  });
}

/* ============================================================
   SVG CHARTS  (no dependency, theme-matched)
   ============================================================ */
function svgLine(pts, color){
  const w=720,h=260,L=46,R=16,T=16,B=36;
  const ys=pts.map(p=>p.y); let mn=Math.min(...ys), mx=Math.max(...ys);
  if(mn===mx){ mn-=1; mx+=1; }
  const padR=(mx-mn)*0.12; mn=Math.max(0,mn-padR); mx+=padR;
  const n=pts.length;
  const X=i=> L + (n<=1 ? (w-L-R)/2 : i*(w-L-R)/(n-1));
  const Y=v=> T + (1-(v-mn)/(mx-mn))*(h-T-B);
  let grid='',yl='';
  for(let t=0;t<=4;t++){ const val=mn+(mx-mn)*t/4, y=Y(val);
    grid+=`<line x1="${L}" y1="${y.toFixed(1)}" x2="${w-R}" y2="${y.toFixed(1)}" stroke="#2c2c35"/>`;
    yl+=`<text x="${L-6}" y="${(y+3.5).toFixed(1)}" text-anchor="end" font-size="11" fill="#a1a1aa" font-family="Inter">${Math.round(val)}</text>`; }
  const coords=pts.map((p,i)=>`${X(i).toFixed(1)},${Y(p.y).toFixed(1)}`);
  const area=`<polygon points="${X(0).toFixed(1)},${(h-B).toFixed(1)} ${coords.join(' ')} ${X(n-1).toFixed(1)},${(h-B).toFixed(1)}" fill="${color}" opacity="0.09"/>`;
  const line=`<polyline points="${coords.join(' ')}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>`;
  const step=Math.ceil(n/6); let dots='',xl='';
  pts.forEach((p,i)=>{ dots+=`<circle cx="${X(i).toFixed(1)}" cy="${Y(p.y).toFixed(1)}" r="3.4" fill="${color}"/>`;
    if(i%step===0||i===n-1) xl+=`<text x="${X(i).toFixed(1)}" y="${h-12}" text-anchor="middle" font-size="10.5" fill="#a1a1aa" font-family="Inter">${esc(p.label)}</text>`; });
  return `<div class="chart"><svg viewBox="0 0 ${w} ${h}" role="img" aria-label="Progress line chart">${grid}${area}${line}${dots}${yl}${xl}</svg></div>`;
}
function svgBars(pts, color){
  const w=720,h=260,L=46,R=16,T=16,B=36;
  const mx=Math.max(...pts.map(p=>p.y),1)*1.12, n=pts.length;
  const bw=Math.min(46,(w-L-R)/n*0.62);
  const X=i=> L + (i+0.5)*(w-L-R)/n;
  const Y=v=> T + (1-v/mx)*(h-T-B);
  let grid='',yl='';
  for(let t=0;t<=4;t++){ const val=mx*t/4, y=Y(val);
    grid+=`<line x1="${L}" y1="${y.toFixed(1)}" x2="${w-R}" y2="${y.toFixed(1)}" stroke="#2c2c35"/>`;
    yl+=`<text x="${L-6}" y="${(y+3.5).toFixed(1)}" text-anchor="end" font-size="11" fill="#a1a1aa" font-family="Inter">${fmtK(val)}</text>`; }
  const step=Math.ceil(n/6); let bars='',xl='';
  pts.forEach((p,i)=>{ const y=Y(p.y), x=X(i);
    bars+=`<rect x="${(x-bw/2).toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${Math.max(0,h-B-y).toFixed(1)}" rx="3" fill="${color}"/>`;
    if(i%step===0||i===n-1) xl+=`<text x="${x.toFixed(1)}" y="${h-12}" text-anchor="middle" font-size="10.5" fill="#a1a1aa" font-family="Inter">${esc(p.label)}</text>`; });
  return `<div class="chart"><svg viewBox="0 0 ${w} ${h}" role="img" aria-label="Volume bar chart">${grid}${bars}${yl}${xl}</svg></div>`;
}
function exChart(recs, ex){
  const unit=unitFor(ex);
  const byDate={};
  recs.filter(r=>r.exercise===ex).forEach(r=>{ const kg=toKg(r.weight, r.unit||'kg'); if(isFinite(kg)) byDate[r.date]=Math.max(byDate[r.date]||0, kg); });
  const dates=Object.keys(byDate).sort();
  if(!dates.length) return `<div class="empty">No weights recorded for this exercise yet.</div>`;
  return svgLine(dates.map(d=>({label:shortDate(d), y:Math.round(fromKg(byDate[d],unit)*10)/10})), '#edc043');
}

/* ============================================================
   RESULTS  /  PROGRESS  VIEW
   ============================================================ */
let resultExercise=null;
function renderResults(doScroll){
  const recs=allRecords(), sess=sessions();
  const doneCount=recs.filter(r=>r.done).length;
  const totalVol=recs.reduce((a,r)=>a+setVolume(r),0);
  const exWithData=[...new Set(recs.filter(r=>isFinite(parseFloat(r.weight))).map(r=>r.exercise))].sort();
  if(!resultExercise || !exWithData.includes(resultExercise)) resultExercise = bestExercise(recs) || exWithData[0] || null;

  let body=`<div class="day-head"><span class="daytag">Progress</span><span class="day-title">Your Results</span></div>
    <div class="day-focus">Everything you log is saved automatically — your sets, weights and progress.</div>
    <div class="stats">
      <div class="stat"><div class="v">${sess.length}</div><div class="l">Sessions</div></div>
      <div class="stat"><div class="v">${doneCount}</div><div class="l">Sets done</div></div>
      <div class="stat"><div class="v">${fmtK(totalVol)}</div><div class="l">kg lifted</div></div>
    </div>`;

  if(!recs.length){
    body+=`<div class="panel"><div class="empty">No sets logged yet.<br>Open today's workout, type the weight &amp; reps and tap ✓ on each set — your charts will build up here automatically. 💪</div></div>`;
  } else {
    const volPts=sess.slice(-12).map(s=>({label:shortDate(s.date), y:s.sets.reduce((a,r)=>a+setVolume(r),0)}));
    body+=`<div class="panel"><h3>Volume per session <small>weight × reps, kg</small></h3>${svgBars(volPts,'#edc043')}</div>`;
    if(exWithData.length){
      const opts=exWithData.map(e=>`<option value="${esc(e)}"${e===resultExercise?' selected':''}>${esc(e)}</option>`).join('');
      const exU=resultExercise?unitFor(resultExercise):'kg';
      body+=`<div class="panel"><h3>Strength progress <small>top set · ${exU}</small><select class="ex-select" id="exSel">${opts}</select></h3>${exChart(recs,resultExercise)}</div>`;
    }
    body+=`<div class="panel"><h3>Recent sessions</h3><div class="sess-list">${
      sess.slice(-8).reverse().map(s=>{
        const dn=s.sets.filter(r=>r.done).length, v=s.sets.reduce((a,r)=>a+setVolume(r),0);
        return `<div class="sess"><span class="s-d">${shortDate(s.date)} · ${esc(s.title)}</span><span class="s-m">${dn} sets · ${fmtK(v)} kg</span></div>`;
      }).join('')
    }</div></div>`;
  }

  contentEl.innerHTML=body;
  const sel=document.getElementById('exSel');
  if(sel) sel.onchange=()=>{ resultExercise=sel.value; renderResults(false); };
  if(doScroll) contentEl.scrollIntoView({behavior:'smooth', block:'start'});
}
function muscleNames(arr){ return (arr||[]).map(k=>MUS[k]).filter(Boolean); }

function card(ex, n, logCtx){
  const primNames = muscleNames(ex.prim);
  const secNames  = muscleNames(ex.sec);
  const targetLine = primNames.length ? primNames.join(' · ') : 'General / Mobility';
  const ph = IMG[ex.name];
  const demo = ph ? `<div class="demo"><img src="${ph[0]}" alt="${ex.name} (start)" loading="lazy" onerror="this.closest(&#39;.demo&#39;).style.display=&#39;none&#39;"/><img class="f1" src="${ph[1]||ph[0]}" alt="${ex.name} (finish)" loading="lazy" onerror="this.style.display=&#39;none&#39;"/><span class="demo-cap">How to do it</span></div>` : ``;
  const map = `<div class="map${ph?``:` full`}">${fig(ex.prim, ex.sec)}</div>`;
  return `
  <div class="card">
    <div class="thumb">
      <span class="exnum">${n}</span>
      ${demo}${map}
    </div>
    <div class="card-body">
      <div class="ex-name">${ex.name}</div>
      <div class="ex-target">${targetLine}</div>
      ${secNames.length ? `<div class="ex-also">assists: <b>${secNames.join(', ')}</b></div>` : ``}
      <div class="ex-meta">
        <span class="pill"><b>${ex.sets}</b> sets</span>
        <span class="pill"><b>${ex.reps}</b> reps</span>
      </div>
      <ol class="steps">${ex.steps.map(s=>`<li>${s}</li>`).join('')}</ol>
      ${logCtx ? logger(ex, logCtx) : ``}
    </div>
  </div>`;
}

function renderDay(i, doScroll){
  const d = DAYS[i];
  const isToday = !TODAY.isRest && i===TODAY.idx;
  const restBanner = (TODAY.isRest && i===0)
    ? `<div class="rest-banner">😴 Today is <b>Sunday</b> — your scheduled rest day. Showing <b>Monday · Push A</b> so you're ready for tomorrow.</div>` : '';
  contentEl.innerHTML = `
    ${restBanner}
    <div class="day-head">
      <span class="daytag">${d.day}</span>
      <span class="day-title">${d.title}</span>
      ${isToday ? `<span class="today-pill">● Today</span>` : ``}
    </div>
    <div class="day-focus">${d.focus}</div>
    <div class="legend">
      <span><i class="sw-p"></i>Primary muscle</span>
      <span><i class="sw-s"></i>Assisting muscle</span>
      <span><i class="sw-i"></i>Not targeted</span>
    </div>

    <div class="section-label"><span class="dot"></span>Workout — 6 exercises</div>
    <div class="cards">${d.exercises.map((e,idx)=>card(e, idx+1, {day:d.day, title:d.title})).join('')}</div>
  `;
  hydrateLoggers();
  if(doScroll) contentEl.scrollIntoView({behavior:'smooth', block:'start'});
}

/* Detect the current day in India (IST), independent of the device's timezone */
function istToday(){
  const now = new Date();
  const weekday = new Intl.DateTimeFormat('en-US',{timeZone:'Asia/Kolkata',weekday:'long'}).format(now);
  const dateStr = new Intl.DateTimeFormat('en-GB',{timeZone:'Asia/Kolkata',weekday:'long',day:'numeric',month:'long',year:'numeric'}).format(now);
  const iso = new Intl.DateTimeFormat('en-CA',{timeZone:'Asia/Kolkata',year:'numeric',month:'2-digit',day:'2-digit'}).format(now); // YYYY-MM-DD
  const map = {Monday:0,Tuesday:1,Wednesday:2,Thursday:3,Friday:4,Saturday:5};
  const idx = map[weekday];
  return { idx: idx===undefined?0:idx, isRest: weekday==='Sunday', weekday, dateStr, iso };
}
const TODAY = istToday();

/* which view is on screen — so we can refresh it after the sheet read-back lands */
let activeView={type:'day', idx:0};
function rerenderCurrent(){ if(activeView.type==='progress') renderResults(false); else renderDay(activeView.idx, false); }

const tabBtns = [];
DAYS.forEach((d,i)=>{
  const b = document.createElement('button');
  const isToday = !TODAY.isRest && i===TODAY.idx;
  b.className = 'tab-btn' + (isToday ? ' today' : '');
  b.innerHTML = `${d.day.slice(0,3)}<small>${d.title}</small>`;
  b.onclick = ()=>{
    document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    activeView={type:'day', idx:i};
    renderDay(i, true);
  };
  tabsEl.appendChild(b);
  tabBtns.push(b);
});

/* Progress / results tab */
const progBtn=document.createElement('button');
progBtn.className='tab-btn prog-tab';
progBtn.innerHTML=`📊<small>Progress</small>`;
progBtn.onclick=()=>{
  document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));
  progBtn.classList.add('active');
  activeView={type:'progress'};
  renderResults(true);
};
tabsEl.appendChild(progBtn);

/* Wire up set-logging (delegated, attached once) and sync any pending rows */
initLog();

/* Auto-open today's session (Sunday falls back to Monday) */
const startIdx = TODAY.isRest ? 0 : TODAY.idx;
activeView={type:'day', idx:startIdx};
tabBtns[startIdx].classList.add('active');
renderDay(startIdx, false);

document.getElementById('todayLine').textContent =
  (TODAY.isRest ? 'Sunday · Rest Day' : TODAY.dateStr) + ' · IST';

/* Pull history back from the sheet, then refresh the view so last-used weights and graphs appear */
pullFromSheet().then(added=>{ if(added) rerenderCurrent(); });

/* Centre today's tab in the horizontally-scrolling row (mobile) */
requestAnimationFrame(()=>{
  const b = tabBtns[startIdx];
  tabsEl.scrollLeft = b.offsetLeft - tabsEl.clientWidth/2 + b.clientWidth/2;
});

/* ============================================================
   REST TIMER
   ============================================================ */
(function(){
  let duration=90, remaining=90, running=false, endAt=0, tick=null, actx=null;
  const fab=document.getElementById('timerFab'), fabIcon=document.getElementById('fabIcon'), fabTime=document.getElementById('fabTime');
  const panel=document.getElementById('timerPanel'), disp=document.getElementById('tpDisplay');
  const toggle=document.getElementById('tpToggle'), addBtn=document.getElementById('tpAdd'), resetBtn=document.getElementById('tpReset'), closeBtn=document.getElementById('tpClose');
  const presets=[...document.querySelectorAll('.tp-presets button')];

  const fmt=s=>{s=Math.max(0,Math.round(s));return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');};
  function render(){
    disp.textContent=fmt(remaining);
    fab.classList.toggle('running', running);
    if(running){fabIcon.textContent=''; fabTime.textContent=fmt(remaining);}
    else{fabIcon.textContent='⏱'; fabTime.textContent='';}
  }
  function clear(){ if(tick){clearInterval(tick);tick=null;} }
  function ensureAudio(){ try{ if(!actx) actx=new (window.AudioContext||window.webkitAudioContext)(); if(actx.state==='suspended') actx.resume(); }catch(e){} }
  function beep(){ if(!actx) return; [0,0.26,0.52].forEach(t=>{ const o=actx.createOscillator(),g=actx.createGain(); o.connect(g);g.connect(actx.destination); o.frequency.value=880; const s=actx.currentTime+t; o.start(s); g.gain.setValueAtTime(0.0001,s); g.gain.exponentialRampToValueAtTime(0.4,s+0.02); g.gain.exponentialRampToValueAtTime(0.0001,s+0.2); o.stop(s+0.22); }); }
  function setDur(s){ duration=s; remaining=s; running=false; clear(); disp.classList.remove('done'); fab.classList.remove('done'); toggle.textContent='Start'; toggle.classList.remove('pause'); presets.forEach(b=>b.classList.toggle('sel', +b.dataset.sec===s)); render(); }
  function finish(){ running=false; clear(); remaining=0; disp.classList.add('done'); fab.classList.remove('running'); fab.classList.add('done'); toggle.textContent='Start'; toggle.classList.remove('pause'); render(); beep(); if(navigator.vibrate) navigator.vibrate([220,120,220]); }
  function start(){ ensureAudio(); if(remaining<=0) remaining=duration; running=true; endAt=Date.now()+remaining*1000; disp.classList.remove('done'); fab.classList.remove('done'); toggle.textContent='Pause'; toggle.classList.add('pause'); clear(); tick=setInterval(()=>{ remaining=(endAt-Date.now())/1000; if(remaining<=0) finish(); else render(); },200); render(); }
  function pause(){ running=false; clear(); remaining=Math.max(0,(endAt-Date.now())/1000); toggle.textContent='Resume'; toggle.classList.remove('pause'); render(); }

  fab.onclick=()=>panel.classList.toggle('open');
  closeBtn.onclick=()=>panel.classList.remove('open');
  toggle.onclick=()=>{ running?pause():start(); };
  addBtn.onclick=()=>{ remaining+=15; if(running) endAt+=15000; disp.classList.remove('done'); fab.classList.remove('done'); render(); };
  resetBtn.onclick=()=>setDur(duration);
  presets.forEach(b=>b.onclick=()=>setDur(+b.dataset.sec));
  setDur(90);
})();
</script>
