<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0b0b0d" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="format-detection" content="telephone=no" />
<title>YD Gains · Gold's Gym Training Split</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --gold:#d4af37;
    --gold-soft:#e8c860;
    --bg:#0b0b0d;
    --bg-2:#141418;
    --card:#1b1b21;
    --card-2:#22222a;
    --line:#2c2c35;
    --text:#f4f4f5;
    --muted:#a1a1aa;
    --green:#3fb950;
    --shadow:0 18px 40px rgba(0,0,0,.45);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html{scroll-behavior:smooth;-webkit-text-size-adjust:100%;text-size-adjust:100%}
  body{
    background:radial-gradient(1200px 600px at 50% -10%, #1a1a20 0%, var(--bg) 55%);
    color:var(--text);
    font-family:'Inter',system-ui,sans-serif;
    min-height:100vh;
    padding-bottom:calc(60px + env(safe-area-inset-bottom));
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.brand,.tab-btn,.daytag,.exnum{font-family:'Oswald',sans-serif;letter-spacing:.5px}

  /* ---------- Header ---------- */
  header{
    text-align:center;
    padding:42px 20px 26px;
    border-bottom:1px solid var(--line);
    background:linear-gradient(180deg, rgba(212,175,55,.06), transparent);
  }
  .brand{
    font-size:clamp(34px,6vw,58px);
    font-weight:700;
    text-transform:uppercase;
    line-height:1;
  }
  .brand span{color:var(--gold)}
  .tagline{color:var(--muted);margin-top:10px;font-size:14px;letter-spacing:2px;text-transform:uppercase}
  .stats{
    display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:18px;
  }
  .chip{
    background:var(--card);border:1px solid var(--line);border-radius:999px;
    padding:7px 16px;font-size:13px;color:var(--muted);
  }
  .chip b{color:var(--gold-soft);font-weight:600}

  /* ---------- Tabs ---------- */
  .tabs{
    position:sticky;top:0;z-index:20;
    display:flex;gap:6px;justify-content:center;flex-wrap:wrap;
    padding:14px 14px;
    padding-top:calc(14px + env(safe-area-inset-top));
    background:rgba(11,11,13,.92);
    backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);
  }
  .tab-btn{
    cursor:pointer;border:1px solid var(--line);background:var(--card);
    color:var(--muted);border-radius:12px;padding:10px 16px;
    font-size:15px;font-weight:600;text-transform:uppercase;
    transition:.18s ease;min-width:104px;text-align:center;line-height:1.2;
  }
  .tab-btn small{display:block;font-size:11px;font-family:'Inter';letter-spacing:.5px;opacity:.7;font-weight:500}
  .tab-btn:hover{border-color:var(--gold);color:var(--text);transform:translateY(-1px)}
  .tab-btn.active{
    background:linear-gradient(180deg,var(--gold),#b8932b);
    color:#1a1a1a;border-color:var(--gold);box-shadow:0 6px 18px rgba(212,175,55,.3);
  }
  .tab-btn.active small{opacity:.85}

  /* ---------- Day content ---------- */
  .wrap{max-width:1080px;margin:0 auto;padding:30px 18px 0}
  .day-head{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:6px}
  .daytag{
    font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;
    color:#1a1a1a;background:var(--gold);padding:5px 12px;border-radius:8px;
  }
  .day-title{font-size:clamp(26px,4vw,38px);font-weight:700;text-transform:uppercase}
  .day-focus{color:var(--muted);margin:4px 0 26px;font-size:15px}

  .section-label{
    display:flex;align-items:center;gap:12px;margin:34px 0 16px;
    font-family:'Oswald';font-size:20px;text-transform:uppercase;letter-spacing:1px;
  }
  .section-label::after{content:"";flex:1;height:1px;background:var(--line)}
  .section-label .dot{width:9px;height:9px;border-radius:50%;background:var(--gold)}

  /* Warm-up */
  .warm-intro{
    background:var(--bg-2);border:1px solid var(--line);border-left:3px solid var(--gold);
    border-radius:12px;padding:16px 18px;color:var(--muted);font-size:14px;margin-bottom:18px;line-height:1.6;
  }
  .warm-intro b{color:var(--text)}

  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
  .card{
    background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:hidden;
    transition:.18s ease;display:flex;flex-direction:column;
  }
  .card:hover{transform:translateY(-3px);border-color:var(--gold);box-shadow:var(--shadow)}
  .thumb{
    height:150px;background:linear-gradient(160deg,#242430,#15151a);
    display:flex;align-items:center;justify-content:center;border-bottom:1px solid var(--line);
    position:relative;
  }
  .thumb svg{width:84%;height:84%}
  .exnum{
    position:absolute;top:10px;left:10px;width:30px;height:30px;border-radius:8px;
    background:var(--gold);color:#1a1a1a;font-weight:700;font-size:15px;
    display:flex;align-items:center;justify-content:center;
  }
  .badge{
    position:absolute;top:10px;right:10px;font-size:10px;letter-spacing:.5px;text-transform:uppercase;
    background:rgba(0,0,0,.55);color:var(--gold-soft);padding:4px 8px;border-radius:6px;border:1px solid var(--line);
  }
  .card-body{padding:15px 16px 17px;display:flex;flex-direction:column;gap:9px;flex:1}
  .ex-name{font-family:'Oswald';font-size:18px;font-weight:600;line-height:1.2}
  .ex-target{font-size:12px;color:var(--gold-soft);text-transform:uppercase;letter-spacing:.5px;margin-top:-4px}
  .ex-meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:2px}
  .pill{
    background:var(--card-2);border:1px solid var(--line);border-radius:7px;
    padding:5px 9px;font-size:12px;color:var(--muted);
  }
  .pill b{color:var(--text);font-weight:600}
  .ex-cue{font-size:13px;color:var(--muted);line-height:1.5;margin-top:auto;padding-top:4px}
  .ex-cue::before{content:"▸ ";color:var(--gold)}

  footer{
    text-align:center;color:var(--muted);font-size:13px;margin-top:46px;
    padding:24px 18px 0;border-top:1px solid var(--line);max-width:1080px;margin-left:auto;margin-right:auto;
  }
  footer b{color:var(--gold-soft)}
  .hidden{display:none}
  @media (max-width:640px){
    /* Tabs: one swipeable row instead of 3 stacked rows */
    .tabs{
      flex-wrap:nowrap;justify-content:flex-start;
      overflow-x:auto;scroll-snap-type:x mandatory;
      -webkit-overflow-scrolling:touch;gap:8px;padding-left:14px;padding-right:14px;
    }
    .tabs::-webkit-scrollbar{display:none}
    .tab-btn{flex:0 0 auto;min-width:84px;scroll-snap-align:center;padding:11px 14px}

    .wrap{padding:24px 14px 0}

    /* Exercises: big single-column rows — image left, details right.
       Far easier to read at arm's length between sets. */
    .cards{grid-template-columns:1fr;gap:12px}
    .card{flex-direction:row;align-items:stretch}
    .thumb{
      height:auto;width:108px;flex:0 0 108px;
      border-bottom:none;border-right:1px solid var(--line);
    }
    .thumb svg{width:74%;height:74%}
    .exnum{width:26px;height:26px;font-size:14px;top:8px;left:8px}
    .badge{font-size:9px;padding:3px 6px;top:8px;right:8px}
    .card-body{padding:13px 14px;gap:7px}
    .ex-name{font-size:18px}
    .ex-cue{font-size:13px;padding-top:2px}
    .card:hover{transform:none} /* no hover-lift on touch */
  }
  @media (max-width:360px){
    .thumb{width:86px;flex:0 0 86px}
    .ex-name{font-size:16px}
  }
</style>
</head>

/* ============================================================
   RENDER
   ============================================================ */
const tabsEl = document.getElementById('tabs');
const contentEl = document.getElementById('content');

function card(ex, n, badge){
  return `
  <div class="card">
    <div class="thumb">
      <span class="exnum">${n}</span>
      ${badge ? `<span class="badge">${badge}</span>` : ``}
      ${ART[ex.art] || ART.mobility}
    </div>
    <div class="card-body">
      <div class="ex-name">${ex.name}</div>
      <div class="ex-target">${ex.target}</div>
      <div class="ex-meta">
        <span class="pill"><b>${ex.sets}</b> sets</span>
        <span class="pill"><b>${ex.reps}</b> reps</span>
        ${ex.load ? `<span class="pill"><b>${ex.load}</b></span>` : ``}
      </div>
      <div class="ex-cue">${ex.cue}</div>
    </div>
  </div>`;
}

function renderDay(i){
  const d = DAYS[i];
  const w = WARMUPS[d.type];
  contentEl.innerHTML = `
    <div class="day-head">
      <span class="daytag">${d.day}</span>
      <span class="day-title">${d.title}</span>
    </div>
    <div class="day-focus">${d.focus}</div>

    <div class="section-label"><span class="dot"></span>Warm-Up — do this first</div>
    <div class="warm-intro">${w.note}</div>
    <div class="cards">${w.items.map((e,idx)=>card(e, idx+1, 'Warm-up')).join('')}</div>

    <div class="section-label"><span class="dot"></span>Workout — 6 exercises</div>
    <div class="cards">${d.exercises.map((e,idx)=>card(e, idx+1)).join('')}</div>
  `;
  contentEl.scrollIntoView({behavior:'smooth', block:'start'});
}

DAYS.forEach((d,i)=>{
  const b = document.createElement('button');
  b.className = 'tab-btn' + (i===0 ? ' active' : '');
  b.innerHTML = `${d.day.slice(0,3)}<small>${d.title}</small>`;
  b.onclick = ()=>{
    document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    renderDay(i);
  };
  tabsEl.appendChild(b);
});

renderDay(0);
</script>
